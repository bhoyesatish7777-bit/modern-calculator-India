<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.calculator{
width:370px;
padding:25px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 15px 40px rgba(0,0,0,.6);
}

.title{
text-align:center;
font-size:40px;
font-weight:900;
letter-spacing:5px;
margin-bottom:20px;
background:linear-gradient(90deg,#00E5FF,#00FF99,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 20px rgba(0,255,255,.7);
}

#display{
width:100%;
height:80px;
border:none;
outline:none;
border-radius:20px;
padding:20px;
font-size:34px;
text-align:right;
color:#00ff99;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.3);
backdrop-filter:blur(20px);
box-shadow:
inset 2px 2px 8px rgba(255,255,255,.2),
inset -2px -2px 8px rgba(0,0,0,.3);
margin-bottom:20px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

button{
height:65px;
border:none;
border-radius:18px;
cursor:pointer;
font-size:22px;
font-weight:bold;
color:#fff;

background:rgba(255,255,255,.12);
border:1.5px solid rgba(255,255,255,.35);

backdrop-filter:blur(15px);

box-shadow:
inset 2px 2px 8px rgba(255,255,255,.3),
inset -2px -2px 8px rgba(0,0,0,.3),
0 8px 20px rgba(0,0,0,.35);

transition:.25s;
}

button:hover{
transform:translateY(-4px) scale(1.05);
border-color:#00E5FF;
box-shadow:
0 0 20px rgba(0,229,255,.8),
0 0 35px rgba(0,255,153,.5);
}

button:active{
transform:scale(.95);
}

.operator{
background:linear-gradient(135deg,#ff9800,#ff5722);
}

.clear{
background:linear-gradient(135deg,#ff1744,#d50000);
}

.equal{
grid-column:span 2;
background:linear-gradient(135deg,#00c853,#00e676);
}

.credit{
text-align:center;
margin-top:18px;
font-size:12px;
letter-spacing:3px;
color:#ddd;
}

</style>

</head>

<body>

<div class="calculator">

<div class="title">
CALCULATOR
</div>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clr()">AC</button>
<button onclick="del()">⌫</button>
<button class="operator" onclick="add('%')">%</button>
<button class="operator" onclick="add('/')">÷</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button class="operator" onclick="add('*')">×</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button class="operator" onclick="add('-')">-</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button class="operator" onclick="add('+')">+</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>

<button class="equal" onclick="calculate()">=</button>

</div>

<div class="credit">
@ SATISH
</div><script>

const display = document.getElementById("display");

function add(value){
    display.value += value;
}

function clr(){
    display.value = "";
}

function del(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

document.addEventListener("keydown",function(e){

    if(!isNaN(e.key) || "+-*/.%".includes(e.key)){
        display.value += e.key;
    }

    if(e.key==="Enter"){
        e.preventDefault();
        calculate();
    }

    if(e.key==="Backspace"){
        del();
    }

    if(e.key==="Escape"){
        clr();
    }

});

</script>

</body>
</html>
